<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DF positioning — interactive 1D sliders</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 24px 32px;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, Arial, sans-serif;
    background: #fafafa; color: #111;
  }
  h1 { margin: 0 0 4px 0; font-size: 22px; }
  .sub { margin: 0 0 24px 0; color: #666; font-size: 13px; }

  .toolbar {
    display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
    padding: 12px 16px; background: white; border: 1px solid #e0e0e0; border-radius: 8px;
  }
  .toolbar button {
    padding: 8px 14px; font-size: 13px; cursor: pointer;
    background: #111; color: white; border: none; border-radius: 6px;
    font-weight: 500;
  }
  .toolbar button:hover { background: #333; }
  .toolbar button.secondary { background: white; color: #111; border: 1px solid #d0d0d0; }
  .toolbar button.secondary:hover { background: #f0f0f0; }

  .entities {
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    margin-left: auto;
  }
  .entity-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 8px 4px 6px; background: #f5f5f5; border: 1px solid #e0e0e0;
    border-radius: 16px; font-size: 12px;
  }
  .entity-chip .swatch {
    width: 12px; height: 12px; border-radius: 50%;
  }
  .entity-chip input.name {
    border: none; background: transparent; font-size: 12px; color: #111;
    width: 90px; padding: 2px 4px; border-radius: 3px;
  }
  .entity-chip input.name:focus { background: white; outline: 1px solid #aaa; }
  .entity-chip .remove {
    cursor: pointer; color: #999; font-size: 14px; line-height: 1;
    background: none; border: none; padding: 0 2px;
  }
  .entity-chip .remove:hover { color: #d62728; }

  .spectrum {
    background: white; border: 1px solid #e0e0e0; border-radius: 8px;
    padding: 18px 24px; margin-bottom: 14px;
  }
  .spectrum .title { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
  .spectrum .desc { font-size: 12px; color: #777; margin-bottom: 12px; }
  .spectrum svg { display: block; width: 100%; height: 80px; user-select: none; }
  .label-left, .label-right {
    font-size: 12px; fill: #555; font-weight: 500;
  }
  .track { stroke: #222; stroke-width: 2; }
  .endcap { stroke: #222; stroke-width: 2; }
  .marker { cursor: grab; }
  .marker:active { cursor: grabbing; }
  .marker-dot { stroke: white; stroke-width: 2; }
  .marker-label {
    font-size: 11px; font-weight: 600; text-anchor: middle;
    pointer-events: none;
  }

  .footer {
    margin-top: 20px; padding: 12px 16px; background: white;
    border: 1px solid #e0e0e0; border-radius: 8px;
    font-size: 12px; color: #666;
  }
</style>
</head>
<body>

<h1>DF positioning — interactive 1D sliders</h1>
<p class="sub">Drag any marker along its spectrum. Add competitors, rename, or remove. State persists in your browser.</p>

<div class="toolbar">
  <button id="add-competitor">+ Add competitor</button>
  <button class="secondary" id="reset">Reset all</button>
  <button class="secondary" id="export">Export positions (JSON)</button>
  <div class="entities" id="entities"></div>
</div>

<div id="spectrums"></div>

<div class="footer">
  Tip: positions are 0–100. Export gives you a copy-paste JSON snapshot to drop into your research notes.
</div>

<script>
// ----- Variables (the 6 spectrums) -----
const variables = [
  { id: 'compliance',    title: 'Compliance',                       desc: 'Patient adherence to wearing protocol',          left: 'Low',         right: 'High' },
  { id: 'offloading',    title: 'Off-loading',                      desc: 'Pressure relief on wound / deformity',           left: 'Minimal',     right: 'Maximum' },
  { id: 'time',          title: 'Time consumption (HCP)',           desc: 'Clinician time to fit, adjust, follow-up',       left: 'Quick',       right: 'Time-intensive' },
  { id: 'adjustability', title: 'Adjustability — fit to deformity', desc: 'Range of anatomies the device can accommodate',  left: 'Generic fit', right: 'Patient-specific' },
  { id: 'mobility',      title: 'Mobility',                         desc: "Patient's ability to move while using device",   left: 'Restricted',  right: 'Full mobility' },
  { id: 'cost',          title: 'Cost',                             desc: 'Total cost: device + clinician time + follow-up', left: 'Low',        right: 'High' }
];

// ----- Default entities (DF + common DFU offloading comparators) -----
// Positions are starting estimates — drag to refine based on your research.
const defaultEntities = [
  { id: 'df',     name: 'DF (target)',          color: '#E63946', positions: { compliance: 75, offloading: 80, time: 30, adjustability: 80, mobility: 70, cost: 35 } },
  { id: 'tcc',    name: 'TCC',                  color: '#1D3557', positions: { compliance: 30, offloading: 95, time: 85, adjustability: 50, mobility: 25, cost: 70 } },
  { id: 'rcw',    name: 'RCW (CAM walker)',     color: '#2A9D8F', positions: { compliance: 60, offloading: 75, time: 30, adjustability: 40, mobility: 60, cost: 40 } },
  { id: 'itcc',   name: 'iTCC',                 color: '#118AB2', positions: { compliance: 80, offloading: 80, time: 50, adjustability: 40, mobility: 50, cost: 45 } },
  { id: 'felted', name: 'Felted foam',          color: '#F4A261', positions: { compliance: 50, offloading: 35, time: 25, adjustability: 60, mobility: 75, cost: 10 } },
  { id: 'ortho',  name: 'Custom ortho. shoe',   color: '#6A4C93', positions: { compliance: 70, offloading: 50, time: 70, adjustability: 90, mobility: 80, cost: 75 } },
  { id: 'half',   name: 'Half shoe',            color: '#E76F51', positions: { compliance: 35, offloading: 60, time: 25, adjustability: 25, mobility: 50, cost: 25 } },
  { id: 'crow',   name: 'CROW boot',            color: '#073B4C', positions: { compliance: 55, offloading: 85, time: 75, adjustability: 70, mobility: 35, cost: 80 } }
];

// ----- State (persisted) -----
const STORAGE_KEY = 'df_positioning_state_v2';
let entities = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return JSON.parse(JSON.stringify(defaultEntities));
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entities));
}

// ----- Render entity chips -----
const entitiesEl = document.getElementById('entities');
function renderEntities() {
  entitiesEl.innerHTML = '';
  entities.forEach(ent => {
    const chip = document.createElement('div');
    chip.className = 'entity-chip';
    chip.innerHTML = `
      <span class="swatch" style="background:${ent.color}"></span>
      <input class="name" value="${escapeHtml(ent.name)}" data-id="${ent.id}">
      <input type="color" value="${ent.color}" data-id="${ent.id}" class="color" style="width:18px;height:18px;border:none;background:none;cursor:pointer;padding:0">
      ${ent.id !== 'df' ? `<button class="remove" data-id="${ent.id}" title="Remove">×</button>` : ''}
    `;
    entitiesEl.appendChild(chip);
  });
  entitiesEl.querySelectorAll('input.name').forEach(inp => {
    inp.addEventListener('input', e => {
      const ent = entities.find(x => x.id === e.target.dataset.id);
      if (ent) { ent.name = e.target.value; saveState(); renderSpectrums(); }
    });
  });
  entitiesEl.querySelectorAll('input.color').forEach(inp => {
    inp.addEventListener('input', e => {
      const ent = entities.find(x => x.id === e.target.dataset.id);
      if (ent) { ent.color = e.target.value; saveState(); renderEntities(); renderSpectrums(); }
    });
  });
  entitiesEl.querySelectorAll('button.remove').forEach(btn => {
    btn.addEventListener('click', e => {
      entities = entities.filter(x => x.id !== e.target.dataset.id);
      saveState(); renderEntities(); renderSpectrums();
    });
  });
}

// ----- Render spectrums -----
const spectrumsEl = document.getElementById('spectrums');
const SVG_NS = 'http://www.w3.org/2000/svg';
const TRACK_PAD_LEFT = 80;
const TRACK_PAD_RIGHT = 80;
const SVG_HEIGHT = 80;

function renderSpectrums() {
  spectrumsEl.innerHTML = '';
  variables.forEach(v => {
    const wrap = document.createElement('div');
    wrap.className = 'spectrum';
    wrap.innerHTML = `<div class="title">${v.title}</div><div class="desc">${escapeHtml(v.desc)}</div>`;
    const svg = document.createElementNS(SVG_NS, 'svg');
    svg.setAttribute('height', SVG_HEIGHT);
    svg.style.width = '100%';
    svg.dataset.variableId = v.id;
    wrap.appendChild(svg);
    spectrumsEl.appendChild(wrap);
  });
  // Draw after attaching so we can measure real width
  document.querySelectorAll('.spectrum svg').forEach(svg => {
    const v = variables.find(x => x.id === svg.dataset.variableId);
    drawSpectrum(svg, v);
    setupDrag(svg);
  });
}

function drawSpectrum(svg, v) {
  while (svg.firstChild) svg.removeChild(svg.firstChild);
  const w = svg.clientWidth || svg.parentElement.clientWidth || 800;
  const trackY = 50;
  const xL = TRACK_PAD_LEFT;
  const xR = w - TRACK_PAD_RIGHT;

  // Left label
  const lblL = document.createElementNS(SVG_NS, 'text');
  lblL.setAttribute('x', xL - 8); lblL.setAttribute('y', trackY + 4);
  lblL.setAttribute('text-anchor', 'end');
  lblL.setAttribute('class', 'label-left');
  lblL.textContent = v.left;
  svg.appendChild(lblL);

  // Right label
  const lblR = document.createElementNS(SVG_NS, 'text');
  lblR.setAttribute('x', xR + 8); lblR.setAttribute('y', trackY + 4);
  lblR.setAttribute('text-anchor', 'start');
  lblR.setAttribute('class', 'label-right');
  lblR.textContent = v.right;
  svg.appendChild(lblR);

  // Track
  const track = document.createElementNS(SVG_NS, 'line');
  track.setAttribute('x1', xL); track.setAttribute('y1', trackY);
  track.setAttribute('x2', xR); track.setAttribute('y2', trackY);
  track.setAttribute('class', 'track');
  svg.appendChild(track);

  // End caps
  [xL, xR].forEach(x => {
    const cap = document.createElementNS(SVG_NS, 'line');
    cap.setAttribute('x1', x); cap.setAttribute('y1', trackY - 8);
    cap.setAttribute('x2', x); cap.setAttribute('y2', trackY + 8);
    cap.setAttribute('class', 'endcap');
    svg.appendChild(cap);
  });

  // Markers (one per entity)
  entities.forEach(ent => {
    const pos = (ent.positions && ent.positions[v.id] != null) ? ent.positions[v.id] : 50;
    const x = xL + (pos / 100) * (xR - xL);

    const g = document.createElementNS(SVG_NS, 'g');
    g.setAttribute('class', 'marker');
    g.setAttribute('transform', `translate(${x},${trackY})`);
    g.dataset.entityId = ent.id;
    g.dataset.variableId = v.id;

    const dot = document.createElementNS(SVG_NS, 'circle');
    dot.setAttribute('r', 9);
    dot.setAttribute('cx', 0); dot.setAttribute('cy', 0);
    dot.setAttribute('fill', ent.color);
    dot.setAttribute('class', 'marker-dot');
    g.appendChild(dot);

    const label = document.createElementNS(SVG_NS, 'text');
    label.setAttribute('class', 'marker-label');
    label.setAttribute('x', 0); label.setAttribute('y', -16);
    label.setAttribute('fill', ent.color);
    label.textContent = ent.name;
    g.appendChild(label);

    svg.appendChild(g);
  });
}

// ----- Drag behaviour -----
function setupDrag(svg) {
  const variableId = svg.dataset.variableId;
  let active = null;

  svg.querySelectorAll('.marker').forEach(g => {
    g.addEventListener('pointerdown', (e) => {
      active = g;
      g.setPointerCapture(e.pointerId);
      e.preventDefault();
    });
    g.addEventListener('pointermove', (e) => {
      if (!active || active !== g) return;
      const rect = svg.getBoundingClientRect();
      const xPx = e.clientX - rect.left;
      const xL = TRACK_PAD_LEFT, xR = rect.width - TRACK_PAD_RIGHT;
      const clamped = Math.max(xL, Math.min(xR, xPx));
      const pct = ((clamped - xL) / (xR - xL)) * 100;
      g.setAttribute('transform', `translate(${clamped},50)`);
      const ent = entities.find(x => x.id === g.dataset.entityId);
      if (ent) {
        ent.positions = ent.positions || {};
        ent.positions[variableId] = Math.round(pct * 10) / 10;
      }
    });
    g.addEventListener('pointerup', (e) => {
      if (active === g) {
        g.releasePointerCapture(e.pointerId);
        active = null;
        saveState();
      }
    });
  });
}

// ----- Toolbar actions -----
document.getElementById('add-competitor').addEventListener('click', () => {
  const palette = ['#1D3557', '#2A9D8F', '#E76F51', '#F4A261', '#6A4C93', '#118AB2', '#073B4C'];
  const used = entities.map(e => e.color);
  const color = palette.find(c => !used.includes(c)) || palette[entities.length % palette.length];
  const id = 'comp_' + Date.now();
  const positions = {};
  variables.forEach(v => positions[v.id] = 50);
  entities.push({ id, name: 'Competitor', color, positions });
  saveState(); renderEntities(); renderSpectrums();
});

document.getElementById('reset').addEventListener('click', () => {
  if (!confirm('Reset all entities and positions to defaults?')) return;
  entities = JSON.parse(JSON.stringify(defaultEntities));
  saveState(); renderEntities(); renderSpectrums();
});

document.getElementById('export').addEventListener('click', () => {
  const blob = JSON.stringify(entities, null, 2);
  navigator.clipboard.writeText(blob).then(() => {
    alert('Positions copied to clipboard as JSON.');
  }, () => {
    const w = window.open('', '_blank');
    w.document.write('<pre>' + escapeHtml(blob) + '</pre>');
  });
});

// ----- Utils -----
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ----- Init -----
renderEntities();
renderSpectrums();

// Redraw on resize so text and marker positions stay correct in actual pixels
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    document.querySelectorAll('.spectrum svg').forEach(svg => {
      const v = variables.find(x => x.id === svg.dataset.variableId);
      drawSpectrum(svg, v);
      setupDrag(svg);
    });
  }, 100);
});
</script>

</body>
</html>
